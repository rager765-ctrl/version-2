<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('kwabz_theme_mode') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
      // Synchronous theme token injection — eliminates nav flash before first paint
      try {
        const navBg = localStorage.getItem('kwabz_nav_bg_cache');
        const primary = localStorage.getItem('kwabz_primary_cache');
        const font = localStorage.getItem('kwabz_font_cache');
        const parts = [];
        if (navBg) {
          parts.push('.top-app-bar{background-color:' + navBg + '!important}');
          parts.push('.bottom-nav{background-color:' + navBg + '!important}');
          parts.push('.bottom-nav-admin{background-color:' + navBg + '!important}');
        }
        if (primary) parts.push(':root{--primary:' + primary + '}');
        if (font) parts.push(':root{--font-headline:' + font + ';--font-body:' + font + '}');
        if (parts.length) {
          const s = document.createElement('style');
          s.id = 'kwabz-instant-theme';
          s.textContent = parts.join('');
          document.head.appendChild(s);
        }
      } catch (_) {}
    })();
  </script>

  <!-- ═══ Top App Bar ═══ -->
  <header class="top-app-bar glass">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;padding-right:0.5rem;">

    <div style="margin-bottom:2rem;">
      <p class="text-label-md" style="color:var(--outline);margin-bottom:0.25rem;">Operations</p>
      <h2 class="font-headline text-headline-lg">Order Management</h2>

    <!-- Filter Chips -->

      <button class="category-pill" data-status="pending">Pending</button>
      <button class="category-pill" data-status="confirmed">Confirmed</button>
      <button class="category-pill" data-status="shipped">Shipped</button>
      <button class="category-pill" data-status="delivered">Delivered</button>
    </div>

    <!-- Order Type Filters -->
    <div class="category-pills" style="margin-bottom:1.5rem; gap:0.35rem;" id="typeFilters">
      <button class="category-pill active" data-type="all" style="font-size:0.75rem; padding:0.4rem 0.8rem; border-radius:100px;">All Types</button>
      <button class="category-pill" data-type="store" style="font-size:0.75rem; padding:0.4rem 0.8rem; border-radius:100px;">🛍️ Store Orders</button>
      <button class="category-pill" data-type="bundle" style="font-size:0.75rem; padding:0.4rem 0.8rem; border-radius:100px;">📶 Data Bundles</button>
    </div>

    <!-- Order Count -->
    <p class="text-label-md" style="color:var(--outline);margin-bottom:1rem;"><span id="orderCount">0</span> ORDERS</p>

    <!-- Order List -->
    <div id="orderList" style="display:flex;flex-direction:column;gap:1rem;"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <span class="material-symbols-outlined empty-state__icon">receipt_long</span>
      <p class="empty-state__title">No orders found</p>
      <p class="empty-state__text">Orders will appear here when customers place them via the store or WhatsApp.</p>
    </div>

    <!-- Bulk Action Toolbar -->
    <div id="bulkToolbar" style="display:none; position:fixed; bottom:5.5rem; left:50%; transform:translateX(-50%); width:92%; max-width:600px; background:var(--surface-container-high); border:1px solid var(--outline-variant); box-shadow:0 12px 40px rgba(0,0,0,0.25); border-radius:var(--radius-xl); padding:1rem; z-index:999; flex-direction:column; gap:0.75rem; animation: slideUpModal 0.3s forwards;">
      <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
        <div style="display:flex; align-items:center; gap:0.5rem;">
          <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)" style="width:1.25rem; height:1.25rem; accent-color:var(--primary); cursor:pointer;" />
          <span style="font-size:0.875rem; font-weight:800; color:var(--on-surface);" id="selectedCountText">0 selected</span>
        </div>
        <select id="bulkStatusSelect" class="minimal-input" style="width:auto; height:2.25rem; font-size:0.75rem; padding:0 0.5rem; border-radius:var(--radius-lg); font-weight:700; border:1px solid var(--outline-variant); background:var(--surface);">
          <option value="">Set Status...</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div style="display:flex; align-items:center; gap:0.5rem; width:100%;">
        <button onclick="bulkNotify()" class="btn-primary" style="flex:1; height:2.5rem; font-size:0.8125rem; background:#25d366; color:white; border:none; display:flex; align-items:center; justify-content:center; gap:0.35rem; font-weight:800; border-radius:var(--radius-lg); cursor:pointer;">
          <span class="material-symbols-outlined" style="font-size:1.1rem;">notifications_active</span> Notify
        </button>
        <button onclick="bulkDelete()" style="flex:1; height:2.5rem; font-size:0.8125rem; background:var(--error-container); color:#410002; border:none; display:flex; align-items:center; justify-content:center; gap:0.35rem; font-weight:800; border-radius:var(--radius-lg); cursor:pointer;">
          <span class="material-symbols-outlined" style="font-size:1.1rem;">delete</span> Delete
        </button>
      </div>
    </div>

  <script>
    window._kwabzReadyCallbacks = window._kwabzReadyCallbacks || [];
    function _onStoreReady(fn) {
      if (window._kwabzStoreReady) { fn(); }
      else { window._kwabzReadyCallbacks.push(fn); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      _onStoreReady(() => {
        if (!KwabzUtils.requireAdmin()) return;

      let activeStatus = 'all';
      let activeType = 'all';
      let selectMode = false;
      let selectedOrderIds = new Set();

      function getNextStatus(order) {
        const status = order.status || 'pending';
        // For data bundle purchases, bypass physical shipping/rider tracking
        if (order.order_method === 'bundle') {
          if (status === 'pending') return 'confirmed';
          if (status === 'confirmed') return 'delivered';
          return null;
        }

        if (status === 'pending') return 'confirmed';
        if (status === 'confirmed') {
          // If order has pre-order items, it requires "shipped" first
          const requiresShipped = (order.items || []).some(item => {
            if (item.availability === 'pre_order') return true;
            const prod = KwabzStore.getProductById(item.product_id);
            return prod && prod.availability === 'pre_order';
          });
          return requiresShipped ? 'shipped' : 'delivered';
        }
        if (status === 'shipped') return 'delivered';
        return null;
      }

      function toggleSelectMode() {
        selectMode = !selectMode;
        const btn = document.getElementById('toggleSelectModeBtn');
        const toolbar = document.getElementById('bulkToolbar');
        
        if (selectMode) {
          btn.textContent = 'Cancel';
          btn.style.background = 'var(--outline)';
          toolbar.style.display = 'flex';
          selectedOrderIds.clear();
          document.getElementById('selectAllCheckbox').checked = false;
          updateSelectedCount();
        } else {
          btn.textContent = 'Bulk Actions';
          btn.style.background = 'var(--primary)';
          toolbar.style.display = 'none';
        }
        renderOrders();
      }
      window.toggleSelectMode = toggleSelectMode;

      function toggleOrderSelection(orderId) {
        if (selectedOrderIds.has(orderId)) {
          selectedOrderIds.delete(orderId);
        } else {
          selectedOrderIds.add(orderId);
        }
        updateSelectedCount();
        // Update individual checkbox checked state without re-rendering the whole list
        const cb = document.querySelector(`.order-checkbox[data-id="${orderId}"]`);
        if (cb) cb.checked = selectedOrderIds.has(orderId);
        
        // Sync the Select All checkbox state
        const visibleOrders = getVisibleOrders();
        const allVisibleSelected = visibleOrders.length > 0 && visibleOrders.every(o => selectedOrderIds.has(o.id));
        document.getElementById('selectAllCheckbox').checked = allVisibleSelected;
      }
      window.toggleOrderSelection = toggleOrderSelection;

      function getVisibleOrders() {
        let orders = KwabzStore.getOrders();
        if (activeStatus !== 'all') orders = orders.filter(o => o.status === activeStatus);
        if (activeType === 'store') orders = orders.filter(o => o.order_method !== 'bundle');
        if (activeType === 'bundle') orders = orders.filter(o => o.order_method === 'bundle');
        return orders;
      }

      function toggleSelectAll(checked) {
        const visibleOrders = getVisibleOrders();
        if (checked) {
          visibleOrders.forEach(o => selectedOrderIds.add(o.id));
        } else {
          visibleOrders.forEach(o => selectedOrderIds.delete(o.id));
        }
        updateSelectedCount();
        // Update checkboxed elements
        document.querySelectorAll('.order-checkbox').forEach(cb => {
          cb.checked = selectedOrderIds.has(cb.dataset.id);
        });
      }
      window.toggleSelectAll = toggleSelectAll;

      function updateSelectedCount() {
        document.getElementById('selectedCountText').textContent = `${selectedOrderIds.size} selected`;
      }

      function handleOrderCardClick(event, orderId) {
        if (selectMode) {
          toggleOrderSelection(orderId);
        } else {
          showOrderDetail(orderId);
        }
      }
      window.handleOrderCardClick = handleOrderCardClick;

      async function bulkDelete() {
        if (selectedOrderIds.size === 0) {
          KwabzUtils.toast('No orders selected', 'error');
          return;
        }

        if (!confirm(`⚠️ Permanently delete ${selectedOrderIds.size} selected orders?\n\nThis cannot be undone.`)) {
          return;
        }

        let successCount = 0;
        for (const orderId of selectedOrderIds) {
          try {
            await KwabzStore.deleteOrder(orderId);
            successCount++;
          } catch (err) {
            console.error(`Failed to delete order ${orderId}:`, err);
          }
        }

        KwabzUtils.toast(`Successfully deleted ${successCount} orders`, 'success');
        toggleSelectMode(); // Exit select mode
      }
      window.bulkDelete = bulkDelete;

      function bulkNotify() {
        if (selectedOrderIds.size === 0) {
          KwabzUtils.toast('No orders selected', 'error');
          return;
        }

        if (!confirm(`Notify ${selectedOrderIds.size} customers via WhatsApp?`)) {
          return;
        }

        const idsArray = Array.from(selectedOrderIds);
        let index = 0;

        function openNext() {
          if (index >= idsArray.length) {
            KwabzUtils.toast('All WhatsApp notifications triggered!', 'success');
            toggleSelectMode();
            return;
          }
          const orderId = idsArray[index];
          const order = KwabzStore.getOrders().find(o => o.id === orderId);
          if (order) {
            KwabzStore.sendStatusUpdateViaWhatsApp(order);
          }
          index++;
          setTimeout(openNext, 800); // 800ms delay to prevent browser blocking
        }

        openNext();
      }
      window.bulkNotify = bulkNotify;

      // Handle status dropdown change
      document.getElementById('bulkStatusSelect').addEventListener('change', async (e) => {
        const newStatus = e.target.value;
        if (!newStatus) return;
        
        if (selectedOrderIds.size === 0) {
          KwabzUtils.toast('No orders selected', 'error');
          e.target.value = '';
          return;
        }

        if (!confirm(`Are you sure you want to update ${selectedOrderIds.size} orders to "${newStatus.toUpperCase()}"?`)) {
          e.target.value = '';
          return;
        }

        let successCount = 0;
        for (const orderId of selectedOrderIds) {
          try {
            await KwabzStore.updateOrderStatus(orderId, newStatus);
            successCount++;
          } catch (err) {
            console.error(`Failed to update status for order ${orderId}:`, err);
          }
        }

        KwabzUtils.toast(`Successfully updated ${successCount} orders`, 'success');
        e.target.value = '';
        toggleSelectMode(); // Exit select mode
      });

      // ─── Status Config ────────────────────────────────────────
      const STATUS_CONFIG = {
        pending:   { label: 'Pending',   icon: 'schedule',       chipClass: 'chip--warning',  next: 'confirmed' },
        confirmed: { label: 'Confirmed', icon: 'check_circle',   chipClass: 'chip--primary',  next: 'shipped' },
        shipped:   { label: 'Shipped',   icon: 'local_shipping', chipClass: 'chip--surface',  next: 'delivered' },
        delivered: { label: 'Delivered', icon: 'done_all',       chipClass: 'chip--success',  next: null },
        cancelled: { label: 'Cancelled', icon: 'cancel',         chipClass: 'chip--error',    next: null },
      };

      // ─── Filter Chips ─────────────────────────────────────────
      document.getElementById('statusFilters').addEventListener('click', (e) => {
        const pill = e.target.closest('.category-pill');
        if (!pill) return;
        activeStatus = pill.dataset.status;
        document.querySelectorAll('#statusFilters .category-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        renderOrders();
      });

      // ─── Type Filter Chips ─────────────────────────────────────
      document.getElementById('typeFilters').addEventListener('click', (e) => {
        const pill = e.target.closest('.category-pill');
        if (!pill) return;
        activeType = pill.dataset.type;
        document.querySelectorAll('#typeFilters .category-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        renderOrders();
      });

      // ─── Render Orders ────────────────────────────────────────
      function renderOrders() {
        let orders = KwabzStore.getOrders();
        if (activeStatus !== 'all') orders = orders.filter(o => o.status === activeStatus);
        if (activeType === 'store') orders = orders.filter(o => o.order_method !== 'bundle');
        if (activeType === 'bundle') orders = orders.filter(o => o.order_method === 'bundle');

        const container = document.getElementById('orderList');
        const empty = document.getElementById('emptyState');
        document.getElementById('orderCount').textContent = orders.length;

        if (orders.length === 0) {
          container.innerHTML = '';
          empty.style.display = 'flex';
          return;
        }
        empty.style.display = 'none';

        container.innerHTML = orders.map(order => {
          const config = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
          const itemCount = order.items.reduce((sum, i) => sum + i.quantity, 0);

          const isBundle = order.order_method === 'bundle';
          const typeBadge = isBundle 
            ? `<span style="background:#fef08a;color:#854d0e;padding:0.15rem 0.5rem;font-size:0.625rem;border-radius:100px;font-weight:700;display:inline-flex;align-items:center;gap:0.25rem;border:1px solid #fde047;">
                <span class="material-symbols-outlined" style="font-size:0.75rem;">wifi</span> Data Purchase
               </span>`
            : '';
          
          const isMiniStore = order.seller_id && order.seller_id !== 'main';
          const sellerBadge = isMiniStore 
            ? `<span style="background:var(--surface-container-high);color:var(--primary);padding:0.15rem 0.5rem;font-size:0.625rem;border-radius:100px;font-weight:700;display:inline-flex;align-items:center;gap:0.25rem;">
                <span class="material-symbols-outlined" style="font-size:0.75rem;">storefront</span> ${order.seller_name || 'Mini-Store'}
               </span>`
            : '';
          
          const commissionBadge = (isMiniStore && typeof order.admin_commission === 'number')
            ? `<p style="font-size:0.7rem;color:#166534;font-weight:700;margin-top:0.25rem;display:flex;align-items:center;gap:0.15rem;justify-content:flex-end;">
                <span class="material-symbols-outlined" style="font-size:0.8rem;">payments</span> Comm: +${KwabzUtils.formatPrice(order.admin_commission)}
               </p>`
            : '';

          const isChecked = selectedOrderIds.has(order.id);
          const checkboxHtml = selectMode 
            ? `<div style="padding-right:0.75rem;display:flex;align-items:center;" onclick="event.stopPropagation()">
                 <input type="checkbox" class="order-checkbox" data-id="${order.id}" ${isChecked ? 'checked' : ''} 
                   onchange="toggleOrderSelection('${order.id}')" 
                   style="width:1.35rem;height:1.35rem;accent-color:var(--primary);cursor:pointer;border-radius:4px;" />
               </div>`
            : '';

          return `
            <div style="background:var(--surface-container-lowest);border-radius:var(--radius-xl);padding:1.25rem;box-shadow:var(--shadow-soft);cursor:pointer;display:flex;align-items:stretch;"
              onclick="handleOrderCardClick(event, '${order.id}')">
              ${checkboxHtml}
              <div style="flex:1;min-width:0;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.75rem;">
                  <div>
                    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                      <p class="font-headline" style="font-weight:700;font-size:1rem;margin:0;">${order.order_label || order.order_number}</p>
                      ${typeBadge}
                      ${sellerBadge}
                    </div>
                    <p style="font-size:0.6875rem;color:var(--outline);margin-top:0.25rem;">${KwabzUtils.formatDate(order.created_at)} • ${KwabzUtils.timeAgo(order.created_at)}</p>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:0.35rem;align-items:flex-end;">
                    <span class="chip ${config.chipClass}">
                      <span class="material-symbols-outlined" style="font-size:0.75rem;">${config.icon}</span>
                      ${config.label}
                    </span>
                    ${order.hidden_by_customer ? `
                      <span class="chip" style="background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:0.2rem 0.5rem;font-size:0.625rem;display:inline-flex;align-items:center;gap:0.25rem;border-radius:100px;font-weight:700;">
                        <span class="material-symbols-outlined" style="font-size:0.75rem;">visibility_off</span> Deleted by User
                      </span>
                    ` : ''}
                  </div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <div>
                    <p style="font-size:0.8125rem;font-weight:600;">${order.customer?.name || 'Guest'}</p>
                    <p style="font-size:0.6875rem;color:var(--outline);">${itemCount} item${itemCount !== 1 ? 's' : ''}</p>
                  </div>
                  <div style="text-align:right;">
                    <span class="font-headline" style="font-weight:800;font-size:1.125rem;display:block;">${KwabzUtils.formatPrice(order.total_price)}</span>
                    ${commissionBadge}
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      // Live GPS Sharing state
      let activeWatchId = null;
      let activeWatchOrderId = null;

      window.toggleGpsShare = function(orderId) {
        if (activeWatchOrderId === orderId) {
          stopGpsShare();
        } else {
          startGpsShare(orderId);
        }
      };

      function startGpsShare(orderId) {
        if (activeWatchId) {
          navigator.geolocation.clearWatch(activeWatchId);
        }
        if (!navigator.geolocation) {
          alert("Geolocation is not supported by your device/browser.");
          return;
        }
        activeWatchOrderId = orderId;
        activeWatchId = navigator.geolocation.watchPosition(
          async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            try {
              await firebase.firestore().collection('orders').doc(orderId).update({
                driver_location: {
                  lat: lat,
                  lng: lng,
                  updated_at: firebase.firestore.FieldValue.serverTimestamp()
                }
              });
              console.log(`[GPS Share] Location updated: ${lat}, ${lng}`);
            } catch (err) {
              console.error('[GPS Share] Firestore error:', err);
            }
          },
          (err) => {
            console.error('[GPS Share] Geolocation watcher error:', err);
            KwabzUtils.toast('GPS tracker failed: ' + err.message, 'error');
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 8000 }
        );
        KwabzUtils.toast('Live GPS sharing started!', 'success');
        showOrderDetail(orderId);
      }

      function stopGpsShare() {
        if (activeWatchId) {
          navigator.geolocation.clearWatch(activeWatchId);
          activeWatchId = null;
        }
        const prevId = activeWatchOrderId;
        activeWatchOrderId = null;
        KwabzUtils.toast('Live GPS sharing stopped.', 'info');
        if (prevId) showOrderDetail(prevId);
      }

      // ─── Order Detail ─────────────────────────────────────────
      function showOrderDetail(orderId) {
        const order = KwabzStore.getOrders().find(o => o.id === orderId);
        if (!order) return;
        const config = STATUS_CONFIG[order.status] || STATUS_CONFIG.pending;
        const content = document.getElementById('orderDetailContent');
        content.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;">
            <div>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;flex-wrap:wrap;">
                <h3 class="font-headline text-headline-md" style="margin:0;">${order.order_label || order.order_number}</h3>
                ${order.order_method === 'bundle' ? `
                  <span style="background:#fef08a;color:#854d0e;padding:0.2rem 0.6rem;font-size:0.625rem;border-radius:100px;font-weight:800;border:1px solid #fde047;display:inline-flex;align-items:center;gap:0.25rem;">
                    <span class="material-symbols-outlined" style="font-size:0.8rem;">wifi</span> DATA PURCHASE
                  </span>
                ` : ''}
              </div>
              <p class="text-body-sm" style="color:var(--outline);">${KwabzUtils.formatDate(order.created_at)}</p>
            </div>
            <div style="display:flex;flex-direction:column;gap:0.35rem;align-items:flex-end;">
              <span class="chip ${config.chipClass}">
                <span class="material-symbols-outlined" style="font-size:0.75rem;">${config.icon}</span>
                ${config.label}
              </span>
              ${order.hidden_by_customer ? `
                <span class="chip" style="background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:0.2rem 0.5rem;font-size:0.625rem;display:inline-flex;align-items:center;gap:0.25rem;border-radius:100px;font-weight:700;">
                  <span class="material-symbols-outlined" style="font-size:0.75rem;">visibility_off</span> Deleted/Hidden by User
                </span>
              ` : ''}
            </div>
          </div>
          ${order.order_method === 'bundle' ? `
            <div style="background:var(--surface-container-low);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.5rem;">
              <p class="text-label-sm" style="color:var(--outline);margin-bottom:0.75rem;">CUSTOMER & RECIPIENT SIM</p>
              <p style="font-weight:600;font-size:0.9375rem;margin-bottom:0.25rem;">${order.customer?.name || 'Guest'}</p>
              <p style="font-size:0.8125rem;color:var(--on-surface-variant);margin-bottom:0.75rem;">📞 Contact: ${order.customer?.phone || ''}</p>
              <div style="background:var(--surface-container-high);padding:0.75rem;border-radius:var(--radius-md);border:1px dashed var(--outline-variant);display:flex;align-items:center;gap:0.5rem;">
                <span class="material-symbols-outlined" style="color:var(--primary);font-size:1.25rem;">cell_tower</span>
                <div>
                  <p style="font-size:0.6875rem;color:var(--outline);margin:0;text-transform:uppercase;">Recipient SIM Details</p>
                  <p style="font-weight:700;font-size:0.875rem;margin:0;color:var(--primary);">${order.customer?.address || ''}</p>
                </div>
              </div>
            </div>
          ` : `
            <div style="background:var(--surface-container-low);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.5rem;">
              <p class="text-label-sm" style="color:var(--outline);margin-bottom:0.75rem;">CUSTOMER</p>
              <p style="font-weight:600;font-size:0.9375rem;margin-bottom:0.25rem;">${order.customer?.name || 'Guest'}</p>
              <p style="font-size:0.8125rem;color:var(--on-surface-variant);">📞 ${order.customer?.phone || ''}</p>
              <p style="font-size:0.8125rem;color:var(--on-surface-variant);">📍 ${order.customer?.address || ''}</p>
            </div>
          `}
          <div style="margin-bottom:1.5rem;">
            <p class="text-label-sm" style="color:var(--outline);margin-bottom:0.75rem;">ITEMS</p>
            ${(order.items || []).map(item => {
              const hasDiscount = item.discount > 0 || (item.original_price && item.original_price > item.price);
              const origPrice = item.original_price || item.price;
              const discPrice = item.price;
              const savings = hasDiscount ? ((origPrice - discPrice) * item.quantity) : 0;
              const discPct = hasDiscount ? (item.discount || Math.round((1 - discPrice/origPrice)*100)) : 0;
              return `
              <div style="display:flex;align-items:center;gap:0.75rem;padding:0.625rem 0;border-bottom:1px solid var(--outline-variant);">
                <img src="${item.image_url}" alt="${item.name}" style="width:2.5rem;height:2.5rem;border-radius:var(--radius-md);object-fit:cover;flex-shrink:0;" />
                <div style="flex:1;min-width:0;">
                  <p style="font-weight:600;font-size:0.8125rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">${item.name}</p>
                  ${item.variant ? `<p style="font-size:0.6875rem;color:var(--primary);margin:0.15rem 0 0 0;font-weight:600;">Size: ${item.variant}</p>` : ''}
                  <div style="display:flex;align-items:center;gap:0.4rem;margin-top:0.15rem;flex-wrap:wrap;">
                    <p style="font-size:0.6875rem;color:var(--outline);margin:0;">Qty: ${item.quantity}</p>
                    ${hasDiscount ? `<span style="font-size:0.6rem;font-weight:800;background:#dcfce7;color:#166534;padding:0.1rem 0.4rem;border-radius:100px;">-${discPct}%</span>` : ''}
                  </div>
                  ${hasDiscount ? `<p style="font-size:0.6875rem;color:var(--outline);text-decoration:line-through;margin:0.15rem 0 0 0;">${KwabzUtils.formatPrice(origPrice)} each</p>` : ''}
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <span style="font-weight:700;font-size:0.8125rem;display:block;">${KwabzUtils.formatPrice(discPrice * item.quantity)}</span>
                  ${hasDiscount ? `<span style="font-size:0.625rem;color:#10b981;font-weight:700;">saved ${KwabzUtils.formatPrice(savings)}</span>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>
          <div style="background:var(--surface-container-low);border-radius:var(--radius-lg);padding:1rem;margin-bottom:0.75rem;display:flex;flex-direction:column;gap:0.4rem;">
            ${(() => {
              const total = order.total_price || 0;
              const deliveryFee = order.delivery_fee || 0;
              const promoDiscount = order.promo_discount || 0;
              const subtotal = total - deliveryFee + promoDiscount;
              const totalSavings = (order.items||[]).reduce((s,i) => {
                const orig = i.original_price || i.price;
                return s + ((orig - i.price) * i.quantity);
              }, 0);
              
              let rowsHtml = `
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:0.8125rem;color:var(--outline);font-weight:600;">Subtotal</span>
                <span style="font-size:0.8125rem;font-weight:700;color:var(--on-surface);">${KwabzUtils.formatPrice(subtotal)}</span>
              </div>`;
              
              if (order.promo_code && promoDiscount > 0) {
                rowsHtml += `
                <div style="display:flex;justify-content:space-between;align-items:center;color:#166534;">
                  <span style="font-size:0.8125rem;font-weight:600;">Promo Code (${order.promo_code})</span>
                  <span style="font-size:0.8125rem;font-weight:700;">- ${KwabzUtils.formatPrice(promoDiscount)}</span>
                </div>`;
              }
              
              if (deliveryFee > 0) {
                rowsHtml += `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span style="font-size:0.8125rem;color:var(--outline);font-weight:600;">Delivery Fee</span>
                  <span style="font-size:0.8125rem;font-weight:700;color:var(--on-surface);">${KwabzUtils.formatPrice(deliveryFee)}</span>
                </div>`;
              }
              
              if (totalSavings > 0) {
                rowsHtml += `
                <div style="display:flex;justify-content:space-between;align-items:center;color:#10b981;">
                  <span style="font-size:0.8125rem;font-weight:600;">Total Savings</span>
                  <span style="font-size:0.8125rem;font-weight:700;">- ${KwabzUtils.formatPrice(totalSavings)}</span>
                </div>`;
              }
              
              return rowsHtml;
            })()}
            <div style="display:flex;justify-content:space-between;align-items:center;padding-top:0.5rem;border-top:1px solid var(--outline-variant);margin-top:0.25rem;">
              <span class="font-headline" style="font-weight:700;">Total Paid</span>
              <span class="font-headline" style="font-weight:800;font-size:1.375rem;">${KwabzUtils.formatPrice(order.total_price)}</span>
            </div>
          </div>
          ${(order.items||[]).some(i => i.seller_id && i.seller_id !== 'main') ? (() => {
            // Use commission_rate stored on the order (set at creation), fall back to seller config, then 10%
            const commPct = typeof order.commission_rate === 'number'
              ? order.commission_rate
              : (() => {
                  const s = KwabzStore.getSellerById(order.seller_id);
                  return (s && typeof s.commission === 'number') ? s.commission : 10;
                })();
            const commDec = commPct / 100;
            const adminCut = order.admin_commission ?? parseFloat((order.total_price * commDec).toFixed(2));
            const sellerCut = parseFloat((order.total_price - adminCut).toFixed(2));
            return `
          <div style="background:var(--primary-container);border-radius:var(--radius-lg);padding:1rem;margin-bottom:2rem;">
            <p class="text-label-sm" style="color:var(--on-primary-container);margin-bottom:0.5rem;text-transform:uppercase;">PLATFORM COMMISSION (${commPct % 1 === 0 ? commPct : commPct.toFixed(2)}%) — ${order.seller_name || 'MINI-STORE'}</p>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:0.8125rem;color:var(--on-primary-container);font-weight:500;">Admin Cut from "${order.seller_name || 'Mini-Store'}" Sale</span>
              <span class="font-headline" style="font-weight:800;font-size:1.125rem;color:var(--primary);">${KwabzUtils.formatPrice(adminCut)}</span>
            </div>
            <p style="font-size:0.6875rem;color:var(--on-primary-container);margin-top:0.5rem;opacity:0.7;">${order.seller_name || 'Seller'} receives ${KwabzUtils.formatPrice(sellerCut)}</p>
          </div>`;
          })() : `<div style="margin-bottom:2rem;"></div>`}

          <!-- GPS Sharing Section for Admin -->
          ${order.status !== 'delivered' && order.status !== 'cancelled' && order.order_method !== 'bundle' ? `
            <div style="background:var(--surface-container-low);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.5rem;border:1px solid var(--outline-variant);">
              <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                <div>
                  <p style="font-weight:700; font-size:0.8125rem; margin:0; display:flex; align-items:center; gap:0.35rem;">
                    <span class="material-symbols-outlined" style="font-size:1.1rem; color:var(--primary);">share_location</span>
                    Live GPS Rider Tracker
                  </p>
                  <p style="font-size:0.6875rem; color:var(--outline); margin:0.15rem 0 0 0;">
                    ${activeWatchOrderId === order.id ? 'Active: sharing your coordinates' : 'Share your live ride coordinates with the customer'}
                  </p>
                </div>
                <button class="${activeWatchOrderId === order.id ? 'btn-secondary' : 'btn-primary'}" onclick="toggleGpsShare('${order.id}')" style="width:auto; height:2.25rem; padding:0 1rem; border-radius:100px; font-size:0.75rem; font-weight:700; border:none; display:flex; align-items:center; gap:0.35rem;">
                  ${activeWatchOrderId === order.id ? `
                    <span class="material-symbols-outlined" style="font-size:1rem; color:var(--error); animation: pulseGently 1.5s infinite;">radio_button_checked</span> Stop Sharing
                  ` : `
                    <span class="material-symbols-outlined" style="font-size:1rem;">my_location</span> Start Sharing
                  `}
                </button>
              </div>
            </div>
          ` : ''}

          <div style="display:flex;flex-direction:column;gap:0.75rem;">
            ${(() => {
              const nextStatus = getNextStatus(order);
              if (nextStatus) {
                return `
                  <button class="btn-primary" onclick="updateStatus('${order.id}', '${nextStatus}')">
                    <span class="material-symbols-outlined" style="font-size:1.125rem;">${STATUS_CONFIG[nextStatus].icon}</span>
                    Mark as ${STATUS_CONFIG[nextStatus].label}
                  </button>
                `;
              } else if (order.status !== 'cancelled') {
                return `
                  <div style="text-align:center;padding:1rem;background:var(--surface-container-low);border-radius:var(--radius-lg);">
                    <span class="material-symbols-outlined" style="color:#166534;font-size:2rem;">task_alt</span>
                    <p class="font-headline" style="font-weight:700;">Order Complete</p>
                  </div>
                `;
              } else {
                return `
                  <div style="text-align:center;padding:1rem;background:var(--error-container);border-radius:var(--radius-lg);">
                    <span class="material-symbols-outlined" style="color:#410002;font-size:2rem;">cancel</span>
                    <p class="font-headline" style="font-weight:700;color:#410002;">Cancelled</p>
                  </div>
                `;
              }
            })()}            <div style="display:flex; gap:0.5rem; margin-top: 0.5rem; flex-wrap: wrap;">
              <button class="btn-whatsapp" onclick="notifyCustomer('${order.id}')" style="flex:1; border-radius:100px; font-size:0.75rem; padding:0.6rem 1rem; display:flex; align-items:center; justify-content:center; gap:0.35rem; height: auto;">
                <span class="material-symbols-outlined" style="font-size:1.1rem;">notifications_active</span>
                Notify
              </button>
              <button onclick="confirmDeleteOrder('${order.id}', '${order.order_label || order.order_number}')" style="flex:1; border-radius:100px; font-size:0.75rem; padding:0.6rem 1rem; background:var(--error-container); color:#410002; font-weight:700; border:none; display:flex; align-items:center; justify-content:center; gap:0.35rem; height: auto; cursor: pointer;">
                <span class="material-symbols-outlined" style="font-size:1.1rem;">delete_forever</span>
                Delete
              </button>
            </div>
          </div>
        `;
        document.getElementById('orderDetailModal').classList.add('open');
      }

      // Make showOrderDetail global for onclick
      window.showOrderDetail = showOrderDetail;

      async function updateStatus(orderId, newStatus) {
        await KwabzStore.updateOrderStatus(orderId, newStatus);
        KwabzUtils.toast(`Order marked as ${STATUS_CONFIG[newStatus].label}`);
        document.getElementById('orderDetailModal').classList.remove('open');
      }
      window.updateStatus = updateStatus;

      function confirmDeleteOrder(orderId, orderNumber) {
        if (!confirm(`⚠️ Permanently delete ${orderNumber}?\n\nThis cannot be undone.`)) return;
        KwabzStore.deleteOrder(orderId)
          .then(() => {
            KwabzUtils.toast(`${orderNumber} deleted`);
            document.getElementById('orderDetailModal').classList.remove('open');
          })
          .catch(err => KwabzUtils.toast('Delete failed: ' + err.message, 'error'));
      }
      window.confirmDeleteOrder = confirmDeleteOrder;

      function notifyCustomer(orderId) {
        const order = KwabzStore.getOrders().find(o => o.id === orderId);
        if (order) KwabzStore.sendStatusUpdateViaWhatsApp(order);
      }
      window.notifyCustomer = notifyCustomer;

      // Render immediately with any cached data available right now
      renderOrders();

      // ─── Data listeners (Debounced for performance) ──────────
      const debouncedRender = KwabzUtils.debounce(() => {
        console.log('[Admin Orders] Batch rendering updates...');
        renderOrders();
      }, 50);

      let previousOrders = null;
      KwabzStore.on('orders_changed', (orders) => {
        if (previousOrders !== null) {
          orders.forEach(newOrder => {
            const oldOrder = previousOrders.find(o => o.id === newOrder.id);
            if (oldOrder) {
              if (oldOrder.status !== 'cancelled' && newOrder.status === 'cancelled') {
                KwabzUtils.toast(`🚨 Order ${newOrder.order_label || newOrder.order_number || ''} was CANCELLED by the customer!`, 'error');
              }
              if (!oldOrder.hidden_by_customer && newOrder.hidden_by_customer) {
                KwabzUtils.toast(`🗑️ Order ${newOrder.order_label || newOrder.order_number || ''} was DELETED/HIDDEN by the customer!`, 'info');
              }
            }
          });
        }
        previousOrders = JSON.parse(JSON.stringify(orders));
        debouncedRender();
      });
      KwabzStore.on('admin_ready',    debouncedRender);
      });
    });
  </script>
</body>
</html>
