  <style>
    :root {
      --font-headline: 'Manrope', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      /* Pure Monochromatic curator palette */
      --bg-dark: #000000;
      --monochromatic-white: #ffffff;
      --monochromatic-gray: #a3a3a3;
      --widget-shadow: rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-dark);
      color: #ffffff;
      font-family: var(--font-body), sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 1rem 0.5rem;
    }

    @media (min-width: 480px) {
      body {
        padding: 2rem;
        overflow: hidden;
      }
    }

    /* ─── Premium Mobile Homescreen Mockup Background ─── */
    .screen-backdrop {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.04) 0%, rgba(0, 0, 0, 1) 85%);
      z-index: 1;
    }

    .blur-dots {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #ffffff;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.04;
      top: 20%;
      left: 10%;
      z-index: 1;
      pointer-events: none;
    }

    /* ─── Standard Duolingo-Size 2x2 Widget Container ─── */
    .widget-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 320px;
      perspective: 1000px;
    }

    /* ─── Tactile 3D Duolingo Widget ─── */
    .duo-widget {
      width: 162px;
      height: 162px;
      background: #121214;
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-bottom: 6px solid var(--monochromatic-white);
      border-radius: 28px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      box-shadow: 0 12px 30px var(--widget-shadow);
      transition: all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform-style: preserve-3d;
      position: relative;
    }

    /* Tactile Push-Down Effect */
    .duo-widget:active {
      transform: translateY(4px);
      border-bottom: 2px solid var(--monochromatic-gray);
      box-shadow: 0 4px 12px var(--widget-shadow);
    }

    /* ─── Widget Inner Layout ─── */
    .widget-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-logo {
      font-family: var(--font-headline), sans-serif;
      font-weight: 900;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
    }

    .widget-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .indicator-dot {
      width: 6px;
      height: 6px;
      background: var(--status-color, #ffffff);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--status-color, #ffffff);
      transition: all 0.3s ease;
    }

    .indicator-pulse {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--status-color, #ffffff);
      border-radius: 50%;
      animation: pulse-ring 1.8s infinite ease-in-out;
      transition: all 0.3s ease;
    }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    /* ─── Central Mascot/Graphic ─── */
    .widget-mascot {
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto 0;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .duo-widget:hover .widget-mascot {
      transform: scale(1.1) rotate(5deg);
    }

    /* Mascot Animations */
    .streak-fire {
      background: linear-gradient(to top, #777777, #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: flame-pulse 1.2s infinite alternate;
    }

    @keyframes flame-pulse {
      0% { transform: scale(0.95); filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); }
      100% { transform: scale(1.05); filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
    }

    /* ─── Widget Value & Label ─── */
    .widget-text-group {
      text-align: center;
      width: 100%;
    }

    .widget-val {
      font-family: var(--font-headline), sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.15rem;
    }

    .widget-lbl {
      font-family: var(--font-headline), sans-serif;
      font-weight: 700;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
    }

    /* ─── Interactive Flip Effect ─── */
    .flip-container {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    /* ─── Under-widget Hint ─── */
    .widget-hint {
      font-family: var(--font-headline), sans-serif;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.4rem 0.8rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
    }

    .widget-hint:active {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    /* ─── Tactile PWA Install Button ─── */
    #installBanner button:active {
      transform: translateY(3px) !important;
      border-bottom-width: 1px !important;
      box-shadow: 0 4px 12px rgba(165,0,0,0.15) !important;
    }

    /* ─── Home Screen PWA Dock Simulator ─── */
    .bottom-pwa-dock {
      margin-top: auto;
      z-index: 10;
      background: rgba(30, 30, 35, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.75rem;
      padding: 0.6rem;
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 280px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .dock-icon {
      flex: 1;
      aspect-ratio: 1/1;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .dock-icon:active {
      background: rgba(165, 0, 0, 0.15);
      border-color: rgba(165, 0, 0, 0.2);
      color: #ffffff;
    }

    .dock-icon span {
      font-size: 1.4rem;
    }

    .dock-icon label {
      font-size: 0.5rem;
      font-weight: 800;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .dock-icon--active {
      color: var(--burgundy-brand) !important;
      background: rgba(165, 0, 0, 0.08) !important;
      border: 1px solid rgba(165, 0, 0, 0.12) !important;
    }

    /* ─── Immersive Standalone Native Widget Presentation ─── */
    @media (display-mode: standalone), (display-mode: fullscreen) {
      body {
        background: #000000 !important;
        justify-content: center !important;
        padding: 0 !important;
      }

      .screen-backdrop, .blur-dots {
        display: none !important;
      }

      .bottom-pwa-dock {
        display: none !important;
      }

      .widget-container {
        transform: scale(1.15);
      }
    }
  </style>
</head>

<body>

  <!-- Widget Layout Container -->
  <div class="widget-container" style="max-width: 650px; padding: 1rem 0; overflow-y: auto; max-height: calc(100vh - 120px);">

  <!-- Bottom PWA Dock Sim -->
  <div class="bottom-pwa-dock">

  <!-- Core Firebase & Store SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="store.js"></script>
  <script src="utils.js"></script>
  <script type="module" src="shell.js"></script>

  <script>
    // ─── Store-ready deferred execution ──────────────────────────────────────────
    // shell.js is type=module so it runs AFTER all inline scripts.
    // We must wait for KwabzStore to emit 'store_initialized' before registering
    // any listeners, otherwise sync events are missed and reads are never counted.
    window._kwabzReadyCallbacks = window._kwabzReadyCallbacks || [];
    function _onStoreReady(fn) {
      if (window._kwabzStoreReady) { fn(); }
      else { window._kwabzReadyCallbacks.push(fn); }
    }

    _onStoreReady(() => {
      // Gate authentication
      if (!KwabzUtils.requireAdmin()) return;

      // ─── Sync Badge & Status Dot Indicator ──────────────────────
      function updateSyncBadge(status, errMsg) {
        const badge = document.getElementById('syncStatus');
        if (!badge) return;

        // Remove existing error container if present
        const oldBox = document.getElementById('syncErrorBox');
        if (oldBox) oldBox.remove();

        const states = {
          syncing: { text: 'SYNCING', color: '#38bdf8', bg: 'rgba(56, 189, 248, 0.15)', icon: 'sync', statusColor: '#38bdf8' },
          online: { text: 'LIVE', color: '#34d399', bg: 'rgba(52, 211, 153, 0.15)', icon: 'database', statusColor: '#34d399' },
          offline: { text: 'OFFLINE', color: '#f87171', bg: 'rgba(248, 113, 113, 0.15)', icon: 'cloud_off', statusColor: '#ef4444' }
        };
        const s = states[status] || states.offline;
        badge.style.color = s.color;
        badge.style.background = s.bg;
        badge.innerHTML = `<span class="material-symbols-outlined ${status === 'syncing' ? 'loading-spin-anim' : ''}" style="font-size:0.875rem;">${s.icon}</span> ${s.text}`;

        // Propagate connection status color dynamically to all widget pulse dots
        document.documentElement.style.setProperty('--status-color', s.statusColor);

        if (status === 'offline' && errMsg) {
          const errBox = document.createElement('div');
          errBox.id = 'syncErrorBox';
          errBox.style.cssText = 'position:fixed;top:5.5rem;right:1.5rem;z-index:9999;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;padding:1rem 1.25rem;border-radius:12px;font-size:0.8125rem;font-weight:700;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:320px;display:flex;align-items:flex-start;gap:0.75rem;animation:slideInNotif 0.3s cubic-bezier(0.16,1,0.3,1);';
          errBox.innerHTML = `
            <span class="material-symbols-outlined" style="color:#b91c1c;font-size:1.25rem;flex-shrink:0;">warning</span>
            <div style="flex:1;text-align:left;">
              <p style="margin:0;font-weight:800;font-size:0.875rem;">Sync Failure</p>
              <p style="margin:0.25rem 0 0;font-size:0.75rem;line-height:1.4;color:#7f1d1d;font-weight:500;">${errMsg}</p>
            </div>
            <button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:#b91c1c;cursor:pointer;padding:0;display:flex;align-items:center;"><span class="material-symbols-outlined" style="font-size:1rem;">close</span></button>
          `;
          document.body.appendChild(errBox);
          
          if (!document.getElementById('slideInNotif-style')) {
            const st = document.createElement('style');
            st.id = 'slideInNotif-style';
            st.textContent = `@keyframes slideInNotif { from { opacity:0; transform:translateX(2rem); } to { opacity:1; transform:translateX(0); } }`;
            document.head.appendChild(st);
          }
        }
      }

      if (!document.getElementById('hubSpin-style')) {
        const style = document.createElement('style');
        style.id = 'hubSpin-style';
        style.textContent = `@keyframes hubSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .loading-spin-anim { animation: hubSpin 2s linear infinite; }`;
        document.head.appendChild(style);
      }

      // Sync state triggers
      updateSyncBadge(KwabzStore.getSyncStatus());
      KwabzStore.on('sync_status', (s, err) => {
        updateSyncBadge(s, err);
      });

      // Subtle startup chime
      setTimeout(() => KwabzUtils.playNotificationSound(), 400);

      // Widget stats array states
      const widgetModes = [
        { key: 'orders',     lbl: 'INCOMING',     icon: 'local_fire_department', color: '#ffffff', isFlame: true },
        { key: 'revenue',    lbl: 'REVENUE',      icon: 'payments',              color: '#ffffff', isFlame: false },
        { key: 'commission', lbl: 'COMMISSION',   icon: 'percent',               color: '#fbbf24', isFlame: false },
        { key: 'pending',    lbl: 'PENDING',      icon: 'pending_actions',       color: '#38bdf8', isFlame: false },
        { key: 'delivered',  lbl: 'DELIVERED',    icon: 'done_all',              color: '#34d399', isFlame: false },
        { key: 'cancelled',  lbl: 'CANCELLED',    icon: 'cancel',                color: '#f87171', isFlame: false },
        { key: 'products',   lbl: 'PRODUCTS',     icon: 'inventory_2',           color: '#a3a3a3', isFlame: false },
        { key: 'presence',   lbl: 'ONLINE',       icon: 'sensors',               color: '#ffffff', isFlame: false },
        { key: 'reads',      lbl: 'FB READS',     icon: 'database',              color: '#6fcf97', isFlame: false }
      ];

      let cachedStats = {
        orders: 0,
        revenue: 'GH₵0.00',
        commission: 'GH₵0.00',
        pending: 0,
        delivered: 0,
        cancelled: 0,
        products: 0,
        presence: 0,
        reads: 0
      };

      // ─── Firebase Read Counter (Billing-Accurate) ───
      // Counts actual Firestore document reads, persisted per-day to match Firebase billing.
      // Each onSnapshot delivers N docs → N reads billed. We accumulate these daily,
      // stored in localStorage with a date key that resets at midnight (like Firebase does).
      const TODAY_KEY = 'kwabz_fb_reads_' + new Date().toISOString().slice(0, 10);

      // Clean up reads counters from previous days to keep localStorage tidy
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith('kwabz_fb_reads_') && k !== TODAY_KEY) {
          localStorage.removeItem(k);
        }
      });

      // Load today's persistent total (survives page refreshes within same billing day)
      let dailyReadCount = parseInt(localStorage.getItem(TODAY_KEY) || '0', 10);
      cachedStats.reads = dailyReadCount;

      // Schedule auto-reset at midnight so the counter rolls over with Firebase billing
      (() => {
        const now = new Date();
        const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const msUntilMidnight = midnight.getTime() - now.getTime();
        setTimeout(() => {
          dailyReadCount = 0;
          cachedStats.reads = 0;
          localStorage.removeItem(TODAY_KEY);
          updateDisplayedStat();
        }, msUntilMidnight);
      })();

      /**
       * recordFirebaseRead()
       * Pulls the current daily read total from localStorage and updates the UI state.
       * Fully immune to double-counting and race conditions.
       */
      function recordFirebaseRead() {
        const currentTotal = parseInt(localStorage.getItem(TODAY_KEY) || '0', 10);
        dailyReadCount = currentTotal;
        cachedStats.reads = dailyReadCount;
        updateDisplayedStat();
      }

      let previousOrdersList = null;

      // ─── Compile Live Database Data ───
      // docCount: the number of documents delivered by this Firestore snapshot (for billing accuracy)
      function computeLiveStats(docCount) {
        if (docCount > 0) recordFirebaseRead(docCount);
        const products = KwabzStore.getAllProducts();
        const orders = KwabzStore.getOrders();

        // A. Active incoming orders
        const activeCount = orders.filter(o => ['pending', 'confirmed'].includes(o.status)).length;
        cachedStats.orders = activeCount;

        // B. Detailed order statuses & revenue/commission metrics
        let revenueSum = 0;
        let commissionSum = 0;
        let pendingCount = 0;
        let deliveredCount = 0;
        let cancelledCount = 0;

        orders.forEach(order => {
          if (order.status === 'pending') pendingCount++;
          else if (order.status === 'delivered') deliveredCount++;
          else if (order.status === 'cancelled') cancelledCount++;

          if (order.status !== 'cancelled') {
            revenueSum += (order.total_price || 0);

            // Compute admin commission
            const hasMiniStoreItem = (order.items || []).some(i => i.seller_id && i.seller_id !== 'main');
            if (hasMiniStoreItem) {
              if (typeof order.admin_commission === 'number') {
                commissionSum += order.admin_commission;
              } else {
                const seller = KwabzStore.getSellerById(order.seller_id);
                const rate = (seller && typeof seller.commission === 'number') ? seller.commission : 10;
                commissionSum += order.total_price * (rate / 100);
              }
            }
          }
        });

        cachedStats.revenue = KwabzUtils.formatPrice(revenueSum);
        cachedStats.commission = KwabzUtils.formatPrice(commissionSum);
        cachedStats.pending = pendingCount;
        cachedStats.delivered = deliveredCount;
        cachedStats.cancelled = cancelledCount;

        // C. Products Listed
        cachedStats.products = products.length;

        // D. Active Presence Count
        updateDisplayedStat();

        // Detect new incoming orders & chime!
        if (previousOrdersList !== null) {
          const newOrders = orders.filter(newO => !previousOrdersList.some(oldO => oldO.id === newO.id));
          if (newOrders.length > 0) {
            KwabzUtils.playNotificationSound();
            KwabzUtils.toast(`🔔 NEW ORDER RECEIVED: ${newOrders[0].order_number || ''}`, 'success');
          }
        }
        previousOrdersList = JSON.parse(JSON.stringify(orders));
      }

      // ─── Render Live Widgets Board ───
      function renderWidgetBoard() {
        const theme = KwabzStore.getSettings()?.theme || {};
        const enabledCardKeys = theme.widgetCards || ['orders', 'revenue', 'commission', 'pending', 'delivered', 'cancelled', 'products', 'presence', 'reads'];
        
        const grid = document.getElementById('widgetBoardGrid');
        if (!grid) return;

        grid.innerHTML = enabledCardKeys.map(key => {
          const mode = widgetModes.find(m => m.key === key);
          if (!mode) return '';

          let value = 0;
          if (mode.key === 'orders') value = cachedStats.orders;
          else if (mode.key === 'revenue') value = cachedStats.revenue;
          else if (mode.key === 'commission') value = cachedStats.commission;
          else if (mode.key === 'pending') value = cachedStats.pending;
          else if (mode.key === 'delivered') value = cachedStats.delivered;
          else if (mode.key === 'cancelled') value = cachedStats.cancelled;
          else if (mode.key === 'products') value = cachedStats.products;
          else if (mode.key === 'presence') value = cachedStats.presence;
          else if (mode.key === 'reads') value = cachedStats.reads;

          const isLargeFont = mode.key === 'revenue' || mode.key === 'commission';
          const fontSz = isLargeFont && String(value).length > 8 ? '1.15rem' : '1.5rem';

          let iconHtml = '';
          if (mode.isFlame) {
            iconHtml = `<span class="material-symbols-outlined streak-fire" style="font-variation-settings: 'FILL' 1; font-size: 2.5rem;">${mode.icon}</span>`;
          } else {
            iconHtml = `<span class="material-symbols-outlined" style="font-size: 2.5rem; color: ${mode.color};">${mode.icon}</span>`;
          }

          return `
            <div class="duo-widget" onclick="tactileFeedback(this)" id="widget_${mode.key}">
              <div class="widget-header">
                <span class="widget-logo" style="font-size: 0.55rem;">${mode.lbl}</span>
                <div class="widget-indicator">
                  <div class="indicator-pulse"></div>
                  <div class="indicator-dot"></div>
                </div>
              </div>
              <div class="widget-mascot">
                ${iconHtml}
              </div>
              <div class="widget-text-group">
                <div class="widget-val" style="font-size: ${fontSz};">${value}</div>
                <div class="widget-lbl" style="font-size: 0.5rem; color: rgba(255,255,255,0.4);">${mode.key === 'reads' ? 'TODAY' : 'LIVE FEED'}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      // ─── Update Displayed Mode Content ───
      function updateDisplayedStat() {
        renderWidgetBoard();
      }

      // ─── Interactive tactile feedback ───
      window.tactileFeedback = function(el) {
        // Subtle toggle tactile audio feedback
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(650, ctx.currentTime);
            gain.gain.setValueAtTime(0.04, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          }
        } catch (e) {}

        // Play 3D press effect
        el.style.transform = 'scale(0.95)';
        setTimeout(() => {
          el.style.transform = '';
        }, 150);
      };

      // ─── Live Presence tracking ───
      let presenceAttached = false;
      function attachPresenceListener() {
        if (presenceAttached) return;
        if (!KwabzStore.isAuthReady() || !KwabzStore.isAdminLoggedIn() || KwabzStore.getSyncStatus() !== 'online') return;
        presenceAttached = true;

        KwabzStore.onAdminsPresence((admins) => {
          const activeAdmins = admins.filter(a => {
            // presence data is nested under a.presence from onAdminsPresence merge
            const lastActive = a.presence?.last_active;
            if (!lastActive) return false;
            const last = lastActive.toDate ? lastActive.toDate() : new Date(lastActive);
            const diff = Math.abs(Date.now() - last.getTime());
            return diff < (15 * 60 * 1000);
          });
          cachedStats.presence = activeAdmins.length;
          updateDisplayedStat();
        });
      }

      // ─── Data synchronization hooks ───
      // Listen to 'firestore_read' which store.js emits ONLY for live server-side
      // snapshots (not cache). This gives billing-accurate counts.
      KwabzStore.on('firestore_read', () => {
        recordFirebaseRead();
      });

      // Cross-Tab Real-Time Sync:
      // When storefront or dashboard tabs trigger Firestore reads, they update localStorage.
      // This listener ensures the widget tab updates its live read display instantly.
      window.addEventListener('storage', (e) => {
        if (e.key === TODAY_KEY) {
          recordFirebaseRead();
        }
      });

      // Still listen to data events to keep stats up to date (without counting reads)
      KwabzStore.on('products_changed', () => computeLiveStats(0));
      KwabzStore.on('orders_changed',   () => computeLiveStats(0));
      KwabzStore.on('sync_status',      () => updateDisplayedStat());

      // Try starting immediately
      attachPresenceListener();

      // Try starting when admin auth is ready or sync finishes
      KwabzStore.on('admin_ready', attachPresenceListener);
      KwabzStore.on('sync_status', (s) => {
        if (s === 'online') attachPresenceListener();
      });

      // ─── PWA Install Engine ───
      let deferredPrompt = null;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('[PWA] captured beforeinstallprompt for widget');
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('installBanner');
        if (banner) banner.style.display = 'block';
      });

      window.addEventListener('appinstalled', () => {
        const banner = document.getElementById('installBanner');
        if (banner) banner.style.display = 'none';
        deferredPrompt = null;
      });

      window.triggerPwaInstall = function() {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        
        if (isIOS) {
          KwabzUtils.toast('📲 iOS installation: Tap Share (📤) > "Add to Home Screen"', 'info');
          return;
        }

        if (!deferredPrompt) {
          KwabzUtils.toast('📲 Tap your browser menu (⋮) > "Install" or "Add to Home Screen"', 'info');
          return;
        }

        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(({ outcome }) => {
          if (outcome === 'accepted') {
            deferredPrompt = null;
            const banner = document.getElementById('installBanner');
            if (banner) banner.style.display = 'none';
          }
        });
      };



      // ─── Theme Live Preview BroadcastChannel Subscription ───
      const previewChannel = new BroadcastChannel('kwabz_theme_preview');
      previewChannel.onmessage = (event) => {
        console.log('[Widget Preview] Received live theme preview data:', event.data);
        if (event.data && event.data.widgetCards) {
          const originalSettings = KwabzStore.getSettings() || {};
          const mockSettings = {
            ...originalSettings,
            theme: {
              ...originalSettings.theme,
              widgetCards: event.data.widgetCards
            }
          };
          KwabzStore.getSettings = () => mockSettings;
          updateDisplayedStat();
        }
      };

      if (window.parent !== window) {
        window.parent.postMessage('PREVIEW_READY', '*');
      }

      // Initial render with any cached data available right now
      computeLiveStats(0);
    }); // end _onStoreReady
  </script>
</body>

</html>
