    .store-header {
      position: relative;
      padding: 8rem 1.5rem 5rem;
      background: var(--surface-container-low);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background-size: cover;

    .store-header.has-hero::before {
      content: '';

          var(--surface) 100%);
      backdrop-filter: blur(8px) saturate(220%) contrast(102%);
      -webkit-backdrop-filter: blur(8px) saturate(220%) contrast(102%);
      z-index: 1;
    }

    .store-header>* {
      position: relative;

    .store-logo {
      width: 7.5rem;

      object-fit: cover;

      background: white;
      border: 4px solid rgba(255, 255, 255, 0.95);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }

    .store-logo:hover {
      transform: scale(1.08) rotate(3deg);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
    }

    .store-name {
      font-family: var(--font-headline);
      font-size: 2.5rem;

        padding: 5rem 1.25rem 2.5rem;

      background: #10b981 !important; /* light green flash for new item */

  <script>
    const sellerId = KwabzUtils.getParam('id');
    let currentSeller = null;
    let lastRenderedSellerProductsJson = '';

    async function renderStore() {
      if (!sellerId) {
        window.location.href = 'sellers.html';
        return;
      }

      const seller = KwabzStore.getSellerById(sellerId);
      if (!seller) {
        // Data might still be syncing from Firestore
        console.log('[Store] Seller data not ready, waiting...');
        return;
      }

      if (seller.hidden) {
        window.location.href = 'sellers.html';
        return;
      }

      currentSeller = seller;

      const aboutLink = document.getElementById('navAboutLink');
      if (aboutLink) {
        aboutLink.href = `seller-about.html?id=${sellerId}`;
      }

      document.getElementById('sellerName').textContent = seller.name;
      document.getElementById('headerTitle').textContent = seller.name;
      document.getElementById('sellerBio').textContent = seller.description || 'Welcome to our mini store. Explore our hand-picked collection of essentials.';

      const logo = document.getElementById('sellerLogo');
      if (logo) {
        logo.src = seller.image_url || 'https://via.placeholder.com/200?text=' + encodeURIComponent(seller.name);
        logo.style.display = 'block';
      }

      const header = document.querySelector('.store-header');
      if (header) {
        const coverUrl = seller.hero_url || 'https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=800';
        header.style.backgroundImage = `url(${coverUrl})`;
        header.classList.add('has-hero');
      }

      // ─── Smart Context Branding ───
      sessionStorage.setItem('kwabz_active_seller_id', sellerId);
      sessionStorage.setItem('kwabz_active_seller_name', seller.name);

      // WhatsApp Chat
      const actionRow = document.getElementById('sellerActions');
      const chatBtn = document.getElementById('chatBtn');
      if (seller.whatsapp && actionRow && chatBtn) {
        actionRow.style.display = 'block';
        chatBtn.onclick = () => {
          const msg = encodeURIComponent(`Hello! I'm interested in your items in "${seller.name}" on Kwabz Store.`);
          const cleanPhone = seller.whatsapp.replace(/\D/g, '');
          window.open(`https://wa.me/${cleanPhone}?text=${msg}`, '_blank');
        };
      }

      const rawProducts = KwabzStore.getProductsBySeller(sellerId);
      // ── Double-guard: enforce seller isolation at UI layer too ──
      // This ensures stale cache or race-condition data never leaks main-store
      // items into this mini-store, even if the store.js filter has a hiccup.
      const products = rawProducts.filter(p => {
        const sid = p.seller_id;
        if (!sid || String(sid).trim().toLowerCase() === 'main') return false;
        return sid === sellerId;
      });

      const container = document.getElementById('catalogSectionsContainer');
      const noProd = document.getElementById('noProducts');
      const count = document.getElementById('itemCount');

      if (count) count.textContent = `${products.length} ITEMS`;

      if (!container) return;

      if (products.length === 0) {
        // If syncing, don't clear the skeletons!
        const syncStatus = (typeof KwabzStore !== 'undefined') ? KwabzStore.getSyncStatus() : 'syncing';
        if (syncStatus === 'syncing') {
          return;
        }
        container.innerHTML = '';
        if (noProd) noProd.style.display = 'block';
        return;
      }

      const settings = KwabzStore.getSettings() || { newTagDuration: 7 };
      const newThreshold = (settings.newTagDuration || 7) * 86400000;

      const currentSellerProductsJson = JSON.stringify(products.map(p => ({
        id: p.id,
        name: p.name,
        price: p.price,
        imageUrl: p.image_url,
        availability: p.availability,
        in_stock: p.in_stock,
        stock: p.stock,
        category_id: p.category_id
      }))) + '_' + newThreshold;

      if (currentSellerProductsJson === lastRenderedSellerProductsJson) {
        if (noProd) noProd.style.display = 'none';
        return; // Skip destructive innerHTML writes if new products list is identical!
      }
      lastRenderedSellerProductsJson = currentSellerProductsJson;

      if (noProd) noProd.style.display = 'none';

      // Group products by category
      const categoriesMap = {};
      const uncategorizedProducts = [];

      products.forEach(p => {
        const catId = p.category_id;
        const cat = catId ? KwabzStore.getCategoryById(catId) : null;
        if (cat) {
          if (!categoriesMap[catId]) {
            categoriesMap[catId] = {
              category: cat,
              products: []
            };
          }
          categoriesMap[catId].products.push(p);
        } else {
          uncategorizedProducts.push(p);
        }
      });

      const sections = [];
      
      // Add categories that have products
      const allCategories = KwabzStore.getCategories() || [];
      allCategories.forEach(cat => {
        if (categoriesMap[cat.id]) {
          const custom = (seller.custom_categories && seller.custom_categories[cat.id]) || {};
          sections.push({
            id: cat.id,
            name: custom.name || cat.name,
            image_url: custom.image_url || cat.image_url,
            description: custom.description || '',
            products: categoriesMap[cat.id].products
          });
        }
      });

      // Add any remaining products in categoriesMap not matching allCategories
      Object.keys(categoriesMap).forEach(catId => {
        const alreadyAdded = sections.some(s => s.id === catId);
        if (!alreadyAdded) {
          const entry = categoriesMap[catId];
          const custom = (seller.custom_categories && seller.custom_categories[catId]) || {};
          sections.push({
            id: catId,
            name: custom.name || entry.category.name,
            image_url: custom.image_url || entry.category.image_url,
            description: custom.description || '',
            products: entry.products
          });
        }
      });

      // Add uncategorized products at the end
      if (uncategorizedProducts.length > 0) {
        sections.push({
          id: 'other',
          name: 'Other Items',
          image_url: '',
          products: uncategorizedProducts,
          isOther: true
        });
      }

      container.innerHTML = sections.map(section => {
        const catImg = section.image_url
          ? `<img src="${KwabzUtils.getOptimizedImageUrl(section.image_url, 150)}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src=''; this.parentElement.innerHTML='<span class=&quot;material-symbols-outlined&quot; style=&quot;color:var(--primary); font-size:1.5rem;&quot;>category</span>'" />`
          : `<span class="material-symbols-outlined" style="color:var(--primary); font-size:1.5rem;">${section.isOther ? 'more_horiz' : 'category'}</span>`;

        const descText = section.isOther
          ? `Additional items and general stock • ${section.products.length} ${section.products.length === 1 ? 'item' : 'items'}`
          : (section.description
            ? `${section.description} • ${section.products.length} ${section.products.length === 1 ? 'item' : 'items'}`
            : `Explore our curated selection of ${section.name.toLowerCase()} • ${section.products.length} ${section.products.length === 1 ? 'item' : 'items'}`);

        const productsHtml = section.products.map(p => {
          const activeDiscount = KwabzUtils.getEffectiveDiscount(p);
          const discPrice = KwabzUtils.calcDiscountedPrice(p.price, activeDiscount);
          const hasDiscount = activeDiscount > 0;
          const isNew = p.created_at && (Date.now() - new Date(p.created_at).getTime() < newThreshold);

          return `
            <div class="product-card" onclick="window.location.href='product-detail.html?id=${p.id}'">
              <div class="product-card__image-wrap">
                <img class="product-card__image" src="${KwabzUtils.getOptimizedImageUrl(p.image_url, 400)}" alt="${p.name}" loading="lazy" 
                  onload="this.classList.add('loaded')"
                  onerror="this.src='https://via.placeholder.com/400x500?text=No+Image';this.classList.add('loaded');this.style.opacity=0.5;" />
                ${p.availability === 'pre_order'
                  ? `<div class="product-card__badge product-card__badge--discount" style="background:#f59e0b; color:#fff;">PRE-ORDER</div>`
                  : hasDiscount
                    ? `<div class="product-card__badge product-card__badge--discount">-${activeDiscount}%</div>`
                    : isNew ? `<div class="product-card__badge product-card__badge--new">NEW</div>` : ''
                }
                <button class="product-card__quick-add" onclick="event.stopPropagation(); quickAdd('${p.id}', this)">
                  <span class="material-symbols-outlined" style="color:#000;font-size:1.25rem;">add</span>
                </button>
              </div>
              <div class="product-card__info">
                <div style="display:flex; flex-direction:column; gap:0.15rem; margin-bottom:0.4rem;">
                  <h4 class="product-card__name" style="margin:0;">${p.name}</h4>
                </div>
                <div class="product-card__price">
                  <span class="product-card__price-current">${KwabzUtils.formatPrice(discPrice)}</span>
                  ${hasDiscount ? `<span class="product-card__price-original">${KwabzUtils.formatPrice(p.price)}</span>` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="category-section" style="margin-bottom: 3.5rem;">
            <!-- Category Intro Card: list style like the sellers list -->
            <div class="category-intro-card" style="display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; border-radius: 1.5rem; background: var(--surface-container-lowest); border: 1px solid #ffffff; margin-bottom: 1.5rem;">
              <div style="width: 3.5rem; height: 3.5rem; border-radius: 1rem; overflow: hidden; background: var(--surface-container-low); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #ffffff;">
                ${catImg}
              </div>
              <div style="flex: 1; text-align: left; min-width: 0;">
                <h3 class="font-headline" style="font-size: 1.15rem; font-weight: 800; margin: 0; color: var(--on-surface); line-height: 1.2;">
                  ${section.name}
                </h3>
                <p style="font-size: 0.8rem; color: var(--outline); margin: 0.15rem 0 0; font-weight: 600;">
                  ${descText}
                </p>
              </div>
            </div>

            <!-- Product Grid for Category -->
            <div class="product-grid">
              ${productsHtml}
            </div>
          </div>
        `;
      }).join('');

      // Force loaded state for already cached images
      container.querySelectorAll('.product-card__image').forEach(img => {
        if (img.complete) {
          img.classList.add('loaded');
        }
      });
    }

    function shareStore() {
      if (!currentSeller) return;
      if (navigator.share) {
        navigator.share({
          title: currentSeller.name + ' — Kwabz Store',
          text: currentSeller.description,
          url: window.location.href
        });
      } else {
        KwabzUtils.toast('Link copied to clipboard');
        navigator.clipboard.writeText(window.location.href);
      }
    }

    function quickAdd(productId, btnEl) {
      const product = KwabzStore.getProductById(productId);
      if (!product) return;
      if (product.availability === 'pre_order') {
        window.location.href = `product-detail.html?id=${productId}`;
        return;
      }
      
      // Tactile visual feedback on the quick-add button
      if (btnEl) {
        const icon = btnEl.querySelector('.material-symbols-outlined');
        const originalIconText = icon ? icon.textContent : 'add';
        const originalBg = btnEl.style.background;
        const originalColor = btnEl.style.color;
        
        btnEl.style.pointerEvents = 'none';
        if (icon) {
          icon.textContent = 'check';
          icon.style.color = '#fff';
        }
        btnEl.style.background = '#10b981';
        btnEl.style.transform = 'scale(0.85)';
        btnEl.style.transition = 'all 0.2s cubic-bezier(0.16, 1, 0.3, 1)';
        
        const badge = document.querySelector('[data-cart-badge]');
        if (badge) {
          badge.classList.remove('badge-bounce-blink');
          void badge.offsetWidth; // trigger reflow
          badge.classList.add('badge-bounce-blink');
        }
        
        setTimeout(() => {
          btnEl.style.pointerEvents = '';
          if (icon) {
            icon.textContent = originalIconText;
            icon.style.color = '#000';
          }
          btnEl.style.background = originalBg;
          btnEl.style.color = originalColor;
          btnEl.style.transform = '';
        }, 1500);
      }
      
      KwabzStore.addToCart(product);
      
      // Smart connection-based toast
      const isOffline = !navigator.onLine || KwabzStore.getSyncStatus() === 'offline';
      if (isOffline) {
        KwabzUtils.toast(`🛒 ${product.name} Added! (Saved Offline)`, 'info');
      } else {
        KwabzUtils.toast(`${product.name} added to cart`);
      }
      KwabzUtils.updateCartBadge();
    }

    // Debounced state update to batch UI reconciliation and prevent DOM thrashing
    const debouncedRenderStore = KwabzUtils.debounce(() => {
      renderStore();
    }, 50);

    function initStorePage() {
      debouncedRenderStore();
      KwabzUtils.updateCartBadge();
    }

    // ─── Event Listeners ───
    if (typeof KwabzStore !== 'undefined') {
      KwabzStore.on('sellers_changed', () => debouncedRenderStore());
      KwabzStore.on('products_changed', () => debouncedRenderStore());
      KwabzStore.on('cart_changed', () => KwabzUtils.updateCartBadge());
      KwabzStore.on('sync_status', (status) => {
        if (status !== 'syncing') debouncedRenderStore();
      });
    }

    // Render immediately from synchronous disk cache for instant, zero-flicker UI
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof KwabzStore !== 'undefined') {
        initStorePage();
      }
      if (typeof KwabzStore !== 'undefined' && !KwabzStore.isInitialized()) {
        KwabzStore.on('store_initialized', () => initStorePage());
      }
    });
  </script>
</body>

</html>
