<!DOCTYPE html>

  <script>
    (function () {
      const savedTheme = localStorage.getItem('kwabz_theme_mode') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
      // Synchronous theme token injection — eliminates nav flash before first paint
      try {
        const navBg = localStorage.getItem('kwabz_nav_bg_cache');
        const primary = localStorage.getItem('kwabz_primary_cache');
        const font = localStorage.getItem('kwabz_font_cache');
        const parts = [];
        if (navBg) {
          parts.push('.top-app-bar{background-color:' + navBg + '!important}');
          parts.push('.bottom-nav{background-color:' + navBg + '!important}');
          parts.push('.bottom-nav-admin{background-color:' + navBg + '!important}');
        }
        if (primary) parts.push(':root{--primary:' + primary + '}');
        if (font) parts.push(':root{--font-headline:' + font + ';--font-body:' + font + '}');
        if (parts.length) {
          const s = document.createElement('style');
          s.id = 'kwabz-instant-theme';
          s.textContent = parts.join('');
          document.head.appendChild(s);
        }
      } catch (_) {}
    })();
  </script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    async function fetchLiveUsers() {
      const container = document.getElementById('liveUsersListContainer');
      const badge = document.getElementById('liveCountBadge');
      
      try {
        const url = (window.RENDER_API_BASE || 'https://kwabz-store-backend.onrender.com') + '/api/visitors/detailed';
        const res = await fetch(url);
        
        if (!res.ok) {
          throw new Error('Server returned HTTP ' + res.status);
        }
        
        const data = await res.json();
        
        if(badge) badge.innerHTML = '<span class="material-symbols-outlined" style="font-size:1rem;">sensors</span> ' + (data.count || 0) + ' ONLINE';
        
        if(!data.visitors || data.visitors.length === 0) {
          container.innerHTML = '<div style="text-align:center; padding:4rem; color:var(--outline); background:var(--surface-container-lowest); border-radius:var(--radius-xl);"><span class="material-symbols-outlined" style="font-size:3rem; margin-bottom:1rem; opacity:0.5;">cloud_off</span><div>No users currently online right now.</div></div>';
          return;
        }
        
        data.visitors.sort((a,b) => b.lastActive - a.lastActive);
        
        container.innerHTML = data.visitors.map(v => {
          const isGuest = !v.uid;
          const name = v.displayName || (isGuest ? 'Guest User' : 'Registered User');
          const page = v.page || 'index.html';
          
          const msAgo = Date.now() - v.lastActive;
          const minsAgo = Math.floor(msAgo / 60000);
          let timeText = minsAgo < 1 ? 'Just now' : minsAgo + 'm ago';
          
          const avatarColor = isGuest ? 'var(--outline)' : 'var(--primary)';
          const icon = isGuest ? 'person' : 'verified_user';
          
          const statusColor = minsAgo < 5 ? '#10b981' : '#f59e0b';
          const statusText = minsAgo < 5 ? 'Active' : 'Idle';
          
          return `
            <div style="background:var(--surface-container-lowest); border-radius:var(--radius-xl); padding:1rem; display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; box-shadow:var(--shadow-soft); transition:transform 0.2s;">
              <div style="width:3rem; height:3rem; border-radius:50%; background:var(--surface-container-high); display:flex; align-items:center; justify-content:center; color:${avatarColor}; flex-shrink:0;">
                <span class="material-symbols-outlined" style="font-size:1.5rem;">${icon}</span>
              </div>
              <div style="flex:1; min-width:0;">
                <div style="font-weight:900; font-size:1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${name}</div>
                <div style="font-size:0.8125rem; color:var(--outline); margin-top:0.35rem; display:flex; align-items:center; gap:0.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                  <span class="material-symbols-outlined" style="font-size:1rem; color:var(--primary);">travel_explore</span>
                  <span style="color:var(--on-surface); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${page}</span>
                </div>
              </div>
              <div style="text-align:right; flex-shrink:0; padding-left:0.5rem;">
                <div style="font-size:0.8125rem; font-weight:900;">${timeText}</div>
                <div style="font-size:0.6875rem; font-weight:800; color:${statusColor}; margin-top:0.25rem; letter-spacing:0.05em; text-transform:uppercase;">${statusText}</div>
              </div>
            </div>
          `;
        }).join('');
      } catch(err) {
        console.error('Failed to fetch live users:', err);
        container.innerHTML = '<div style="text-align:center; padding:4rem; color:#ef4444; background:var(--surface-container-lowest); border-radius:var(--radius-xl);"><span class="material-symbols-outlined" style="font-size:3rem; margin-bottom:1rem; opacity:0.5;">error</span><div>Failed to connect to Render Server.</div><div style="font-size:0.75rem; margin-top:0.5rem; opacity:0.7;">' + err.message + '</div></div>';
      }
    }
    
    // Auto-refresh
    fetchLiveUsers();
    setInterval(fetchLiveUsers, 10000);
  });
</script>
